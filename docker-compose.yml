version: '3.8'

services:
  frontend:
    image: origin4data/ranking-comprec:latest
    environment:
      - NEXT_PUBLIC_SHEETS_JSON_URL=${NEXT_PUBLIC_SHEETS_JSON_URL}
    networks:
      - network_swarm_public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_swarm_public"

        - "traefik.http.routers.ranking-comprec.rule=Host(`rankingcomprec.com.br`) || Host(`www.rankingcomprec.com.br`)"
        - "traefik.http.routers.ranking-comprec.entrypoints=websecure"
        - "traefik.http.routers.ranking-comprec.tls=true"
        - "traefik.http.routers.ranking-comprec.tls.certresolver=letsencryptresolver"

        # Next.js expõe na porta 3000
        - "traefik.http.services.ranking-comprec.loadbalancer.server.port=3000"

networks:
  network_swarm_public:
    external: true
    name: network_swarm_public
